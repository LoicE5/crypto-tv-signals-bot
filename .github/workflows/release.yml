name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build Linux binaries
        run: bun run scripts/build.ts linux-x64 && bun run scripts/build.ts linux-arm64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/crypto-tv-signals-bot-linux-x64
            dist/crypto-tv-signals-bot-linux-arm64

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build macOS binaries
        run: bun run scripts/build.ts macos-x64 && bun run scripts/build.ts macos-arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            dist/crypto-tv-signals-bot-macos-x64
            dist/crypto-tv-signals-bot-macos-arm64

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract version
        id: version
        run: echo "value=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Extract changelog notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          NOTES=$(awk "/^## ${VERSION}/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/crypto-tv-signals-bot-linux-x64
            dist/crypto-tv-signals-bot-linux-arm64
            dist/crypto-tv-signals-bot-macos-x64
            dist/crypto-tv-signals-bot-macos-arm64
